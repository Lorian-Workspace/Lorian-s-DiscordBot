name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable SemVer version from Cargo.toml, without leading v
        required: true
        type: string

permissions: {}

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_VERSION: ${{ inputs.version }}
  TARGET_TRIPLE: x86_64-unknown-linux-gnu
  ASSET_NAME: lorian-discord-bot-x86_64-unknown-linux-gnu

jobs:
  build_test:
    name: Build and test release artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release input and main HEAD
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE}" != "branch" ] || [ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]; then
            echo "workflow_dispatch must run on ${DEFAULT_BRANCH}; got ${GITHUB_REF}" >&2
            exit 1
          fi

          if ! printf '%s\n' "${RELEASE_VERSION}" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
            echo "version input must be strict stable SemVer (X.Y.Z)" >&2
            exit 1
          fi

          git fetch --depth=1 origin "${DEFAULT_BRANCH}"
          HEAD_SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(git rev-parse "origin/${DEFAULT_BRANCH}")"
          if [ "${HEAD_SHA}" != "${MAIN_SHA}" ]; then
            echo "workflow must run at origin/${DEFAULT_BRANCH} HEAD" >&2
            echo "HEAD=${HEAD_SHA}" >&2
            echo "origin/${DEFAULT_BRANCH}=${MAIN_SHA}" >&2
            exit 1
          fi

          CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          if [ "${RELEASE_VERSION}" != "${CARGO_VERSION}" ]; then
            echo "version input ${RELEASE_VERSION} does not match Cargo.toml ${CARGO_VERSION}" >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "tag v${RELEASE_VERSION} already exists" >&2
            exit 1
          fi

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal --target "${TARGET_TRIPLE}"
          rustup default stable

      - name: Run release tests
        run: cargo test --locked --release

      - name: Build release binary
        run: cargo build --locked --release --target "${TARGET_TRIPLE}"

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release
          cp "target/${TARGET_TRIPLE}/release/lorian-discord-bot" "release/${ASSET_NAME}"
          (
            cd release
            sha256sum "${ASSET_NAME}" > "${ASSET_NAME}.sha256"
            sha256sum -c "${ASSET_NAME}.sha256"
          )

      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-assets
          path: release/
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build_test
    environment: release
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets
          path: release

      - name: Create GitHub release from main HEAD
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG_NAME="v${RELEASE_VERSION}"
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "release ${TAG_NAME} already exists" >&2
            exit 1
          fi

          gh release create "${TAG_NAME}" \
            --target "${GITHUB_SHA}" \
            --title "Release ${TAG_NAME}" \
            --generate-notes \
            "release/${ASSET_NAME}" \
            "release/${ASSET_NAME}.sha256"
